<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GYMORA — Optimize. Recover. Achieve.</title>

  <!-- Installable web app (Add to Home Screen) -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GYMORA" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <link rel="stylesheet" href="styles.css" />
  <!-- live design layer: applies the look published from the admin
       Design studio before the first paint (cached, then refreshed) -->
  <script src="theme.js"></script>
</head>
<body data-theme="dark">
  <!-- Splash screen (shown once per session, fades out after load) -->
  <div id="splash" aria-hidden="true">
    <img src="logo-mark.png" alt="" width="96" height="96" />
    <div class="splash-name">GYMORA</div>
    <div class="splash-tag">Optimize. Recover. Achieve.</div>
  </div>
  <script>
    (function () {
      var s = document.getElementById("splash");
      if (sessionStorage.getItem("gym_splashed")) { s.remove(); return; }
      sessionStorage.setItem("gym_splashed", "1");
      window.addEventListener("load", function () {
        setTimeout(function () {
          s.classList.add("hide");
          setTimeout(function () { s.remove(); }, 450);
        }, 750);
      });
    })();
  </script>

  <!-- Top bar -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <div class="brand">
        <span class="logo"><img src="logo-mark.png" alt="GYMORA logo" /></span>
        <span>GYMORA<small id="brandTag">Optimize. Recover. Achieve.</small></span>
      </div>
      <div class="spacer"></div>
      <select id="currencySel" class="control" title="Currency"></select>
      <button id="langToggle" class="control" style="font-weight:700">العربية</button>
      <button id="themeToggle" class="icon-btn" title="Theme">🌙</button>
      <div id="authSlot"></div>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="wrap">
      <h1 id="heroTitle">Find your gym in Amman</h1>
      <p id="heroSub">Compare facilities, hours, pool times, trainers and prices — then subscribe in one tap.</p>
      <div class="searchbar">
        <span style="font-size:18px;align-self:center;padding-inline-start:6px">🔍</span>
        <input id="searchInput" type="text" placeholder="Search by gym name or area…" />
      </div>
    </div>
  </section>

  <main class="wrap">
    <!-- category circles: GYMs / Nutrition / Supplements / Rank -->
    <div class="cats" id="catStrip"></div>
    <div class="layout">
      <!-- Filters -->
      <aside class="panel filters" id="filtersPanel">
        <button class="filters-head" id="filtersToggle" type="button">
          <span id="lblFilters">Filters</span>
          <span class="filters-head-right">
            <span class="filters-count" id="filtersCount"></span>
            <span class="chev" id="filtersChev">▾</span>
          </span>
        </button>
        <div id="filtersBody">

        <div class="field">
          <label id="lblArea">Area</label>
          <select id="areaSel"></select>
        </div>

        <div class="field">
          <label id="lblFacilities">Facilities</label>
          <div class="chips" id="facilChips"></div>
        </div>

        <div class="field">
          <label id="lblPool">Pool</label>
          <div class="chips" id="poolChips"></div>
        </div>

        <div class="field">
          <label id="lbl247">24/7</label>
          <div class="chips" id="h247Chips"></div>
        </div>

        <div class="field">
          <label id="lblAccess">Access</label>
          <div class="chips" id="accessChips"></div>
        </div>

        <div class="field">
          <label id="lblAge">Minimum age</label>
          <select id="ageSel"></select>
        </div>

        <div class="field">
          <label id="lblPrice">Max monthly price</label>
          <input id="priceRange" type="range" min="20" max="80" step="1" value="80" />
          <div class="range-val" id="priceVal"></div>
        </div>

        <div class="field">
          <label id="lblSort">Sort by</label>
          <select id="sortSel"></select>
        </div>

        <button class="linkbtn" id="clearBtn">Clear filters</button>
        </div>
      </aside>

      <!-- Content -->
      <section>
        <!-- LIST VIEW -->
        <div id="listWrap">
          <div class="results-head">
            <div class="tabs">
              <button class="tab active" id="tabAll">All gyms</button>
              <button class="tab" id="tabFav">Favorites</button>
              <button class="tab near-btn" id="nearMeBtn"><span class="near-ico">📍</span><span id="nearMeLbl">Near me</span></button>
            </div>
            <span class="count" id="resultCount"></span>
          </div>
          <div class="grid" id="grid" style="display:grid"></div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detailView" style="display:none"></div>

        <!-- FEATURE VIEW (nutrition / supplements / rank pages) -->
        <div id="featureView" style="display:none"></div>
      </section>
    </div>
  </main>

  <div class="footer" id="appFooter">
    GYMORA · Amman, Jordan 🇯🇴
  </div>

  <!-- Payment explainer modal -->
  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h3 id="modalTitle">How payment will work</h3>
      <div id="modalBody"></div>
      <button class="btn" id="modalClose" style="width:100%;margin-top:6px">Close</button>
    </div>
  </div>

  <!-- Auth / account modal -->
  <div class="auth-back" id="authBack">
    <div class="auth-modal" id="authModal"></div>
  </div>

  <!-- Compare tray + modal -->
  <div class="cmp-tray" id="cmpTray"></div>
  <div class="auth-back" id="cmpBack">
    <div class="auth-modal wide" id="cmpModal"></div>
  </div>

  <!-- Quick check-in (one tap → camera → points) -->
  <button class="fab-checkin" id="quickCheckin" aria-label="Check in" title="Check in">
    <span class="fab-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5v11M17.5 6.5v11M3.5 9.5v5M20.5 9.5v5M6.5 12h11"/>
      </svg>
      <span class="fab-plus">+</span>
    </span>
    <span class="fab-label" id="fabLabel">Check in</span>
  </button>
  <input id="quickCheckinInput" type="file" accept="image/*" capture="environment" hidden />

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- To enable real photo AI later, uncomment and point at your deployed endpoint:
       <script>window.GYMORA_CONFIG = { aiEndpoint: "/.netlify/functions/analyze-food" };</script> -->
  <script src="data.js"></script>
  <script src="cloud.js"></script>
  <script src="keys.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="plan.js"></script>
  <script src="nutrition.js"></script>
  <script src="portals.js"></script>
  <script src="engage.js"></script>
  <script src="rank.js"></script>
  <script src="workouts.js"></script>
  <script src="shop.js"></script>
  <script src="exvideos-local.js"></script>
  <script src="videos.js"></script>
  <script src="exlib.js"></script>
  <script src="classes.js"></script>
  <script src="premium.js"></script>
  <script src="messages.js"></script>
  <script src="tickets.js"></script>
  <script src="notices.js"></script>
  <script src="onboarding.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
