# Netlify configuration for GYMORA.
# The site is plain HTML/CSS/JS with no build step. The build command
# copies the site files into public/ and we publish that folder — this
# matches the site's expected deploy directory on Netlify.

[build]
  command = "rm -rf public && mkdir public && cp index.html admin.html styles.css manifest.json app.js auth.js cloud.js keys.js data.js engage.js nutrition.js onboarding.js plan.js portals.js rank.js shop.js workouts.js icon-180.png icon-192.png icon-512.png logo.png logo-mark.png public/ && cp -r fonts public/fonts"
  publish = "public"

[functions]
  directory = "netlify/functions"

# /admin is its own standalone console page.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Single-page app: serve index.html for every other route so deep links
# like /coach load the app instead of a 404. (Function paths such as
# /api/* take precedence over redirect rules.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
